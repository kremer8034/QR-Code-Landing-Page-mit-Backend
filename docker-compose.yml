services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Supabase project (database + storage)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Secret used to sign backoffice session cookies (generate a long random string)
      SESSION_SECRET: ${SESSION_SECRET}
      # Optional: public base URL used as a fallback for QR links if not set in the backoffice
      APP_BASE_URL: ${APP_BASE_URL:-}
    restart: unless-stopped
